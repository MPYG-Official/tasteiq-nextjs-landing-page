version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tasteiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tasteiq_user
      POSTGRES_PASSWORD: tasteiq_password
      POSTGRES_DB: tasteiq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasteiq_user -d tasteiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tasteiq-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasteiq-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://tasteiq_user:tasteiq_password@postgres:5432/tasteiq_db?schema=public
      
      # Analytics (set these in .env or override in docker-compose.override.yml)
      NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${NEXT_PUBLIC_GA4_MEASUREMENT_ID:-}
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
      NEXT_PUBLIC_GOOGLE_ADS_ID: ${NEXT_PUBLIC_GOOGLE_ADS_ID:-}
      NEXT_PUBLIC_FACEBOOK_PIXEL_ID: ${NEXT_PUBLIC_FACEBOOK_PIXEL_ID:-}
      NEXT_PUBLIC_LINKEDIN_ID: ${NEXT_PUBLIC_LINKEDIN_ID:-}
      NEXT_PUBLIC_MICROSOFT_UET_ID: ${NEXT_PUBLIC_MICROSOFT_UET_ID:-}
      
      # Site Configuration
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      
      # Admin Password
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      
      # Edge Config (Optional)
      EDGE_CONFIG_URL: ${EDGE_CONFIG_URL:-}
      
      # Node Environment
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tasteiq-network
    volumes:
      # Mount prisma for migrations (optional, for development)
      - ./prisma:/app/prisma:ro

volumes:
  postgres_data:
    driver: local

networks:
  tasteiq-network:
    driver: bridge


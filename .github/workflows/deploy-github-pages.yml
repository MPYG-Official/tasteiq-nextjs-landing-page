name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site (custom domain at root)
        env:
          NEXT_PUBLIC_SITE_URL: https://tasteiq.in
          NEXT_PUBLIC_BASE_PATH: ''
          STATIC_EXPORT: '1'
          SKIP_DATABASE: '1'
        run: npm run build:static

      - name: Prepare artifact (CNAME + Jekyll bypass)
        run: |
          echo "tasteiq.in" > out/CNAME
          touch out/.nojekyll
          test -f out/index.html
          ls out/_next/static/css/*.css >/dev/null
          head -1 out/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
